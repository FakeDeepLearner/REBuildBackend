spring:
  profiles:
    active: "local"
  config:
    import: optional:file:.env[.properties]
---

spring:
  rabbitmq:
    host: localhost
    port: 5672
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    open-in-view: off
  security:
    user:
      name: "eren"
      password: "12Eren89"
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  main:
    banner-mode: off
    allow-bean-definition-overriding: true
  docker:
    compose:
      start:
        command: up
      lifecycle-management: start-and-stop
  batch:
    job:
      enabled: true
  jackson:
    time-zone: UTC

logging:
  level:
    root: warn
    org:
      springframework:
        security: trace

server:
  servlet:
    session:
      timeout: 20m
      cookie:
        http-only: true
        secure: true
        same-site: strict
        name: JSESSIONID
  port: 443
---

spring:
  config:
    activate:
      on-profile: "local"
  datasource:
    url: jdbc:postgresql://localhost:5433/resumes
    driver-class-name: org.postgresql.Driver
    username: ${LOCAL_DATABASE_USER}
    password: ${LOCAL_DATABASE_PASSWORD}


---

spring:
  config:
    activate:
      on-profile: "test"
  datasource:
    url: ${TEST_DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${AURORA_TEST_USERNAME}
    password: ${AURORA_TEST_PASSWORD}

---

spring:
  config:
    activate:
      on-profile: "prod"
  datasource:
    url: ${PROD_DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${AURORA_PROD_USERNAME}
    password: ${AURORA_PROD_PASSWORD}